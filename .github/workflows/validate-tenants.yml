name: validate-tenants

# Guardrail: block any tenant that lacks default-deny NetworkPolicy + quota +
# limitrange. Lint only — no cluster access, no image builds.
on:
  pull_request:
    paths:
      - 'platform/tenants/**'
      - 'platform/tenant-template/**'
      - 'platform/scripts/check-tenant-isolation.py'
  workflow_dispatch:

jobs:
  tenant-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml
      - run: python3 platform/scripts/check-tenant-isolation.py
