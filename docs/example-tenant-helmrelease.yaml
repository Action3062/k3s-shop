# BEISPIEL (in docs/, NICHT unter platform/tenants/ — sonst würde Flux es ausrollen).
# So sieht eine von der Control-Plane generierte HelmRelease aus. Host: thomas.vaultwarden.meinappnest.org
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: thomas-vaultwarden
  namespace: flux-system
spec:
  interval: 10m
  releaseName: vaultwarden
  targetNamespace: tenant-thomas-vaultwarden
  storageNamespace: tenant-thomas-vaultwarden
  install: { createNamespace: false }
  upgrade: { remediation: { retries: 3 } }
  chart:
    spec:
      chart: ./platform/catalog/vaultwarden
      sourceRef: { kind: GitRepository, name: flux-system, namespace: flux-system }
  values:
    username: thomas
    appName: vaultwarden
    baseDomain: meinappnest.org
    replicas: 1
    storage: { size: 5Gi }
