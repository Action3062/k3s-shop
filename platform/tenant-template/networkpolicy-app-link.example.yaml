# OPTIONAL / OPT-IN — NICHT in der Control-Plane-Render-Liste (TEMPLATE_FILES).
# Engere Alternative zu allow-intra-tenant-* aus networkpolicy.yaml: erlaubt nur
# EINE konkrete App-Beziehung (Quell-App -> Ziel-App:Port) innerhalb desselben
# Tenants, statt offener Intra-Tenant-Kommunikation.
#
# Zusaetzliche Platzhalter (muessten in templates.ts ergaenzt werden):
#   __DST_APP__        z. B. sonarr             (Ziel-App)
#   __DST_NAMESPACE__  z. B. tenant-thomas-sonarr (Ziel-Namespace)
#   __PORT__           z. B. 8989               (Ziel-Port)
# Bereits vorhanden: __NAMESPACE__ (= Quell-Ns), __TENANT__, __APP__ (= Quell-App).
#
# Da je App genau EIN Namespace existiert, ist die Auswahl ueber die
# Namespace-Labels (dynstore.io/tenant + dynstore.io/app) bereits app-genau und
# unabhaengig von (chart-spezifischen) Pod-Labels.

# (a) Egress an der QUELLE __NAMESPACE__: nur zu __DST_APP__:__PORT__ desselben Tenants
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-__APP__-to-__DST_APP__
  namespace: __NAMESPACE__
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              dynstore.io/tenant: "__TENANT__"
              dynstore.io/app: "__DST_APP__"
      ports:
        - { port: __PORT__, protocol: TCP }
---
# (b) Ingress am ZIEL __DST_NAMESPACE__: nur von der Quell-App __APP__ desselben Tenants
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-__DST_APP__-from-__APP__
  namespace: __DST_NAMESPACE__
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              dynstore.io/tenant: "__TENANT__"
              dynstore.io/app: "__APP__"
      ports:
        - { port: __PORT__, protocol: TCP }
