apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: __NAMESPACE__
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "__CPU_LIMIT__"
        memory: "__MEM_LIMIT__"
