apiVersion: v1
kind: Service
metadata:
  name: {{ include "radarr.fullname" . }}
spec:
  selector:
    app: radarr
  ports:
    # 80 fuer den Ingress (Konvention), 7878 fuer Intra-Cluster *arr-Connectivity (Radarr-Standardport)
    - name: http
      port: 80
      targetPort: {{ .Values.port | default 7878 }}
    - name: radarr
      port: {{ .Values.port | default 7878 }}
      targetPort: {{ .Values.port | default 7878 }}
