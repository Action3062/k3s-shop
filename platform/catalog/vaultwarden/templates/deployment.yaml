apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vaultwarden.fullname" . }}
  labels:
    app: vaultwarden
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
      annotations:
        meinappnest.io/restart-token: "{{ .Values.restartToken | default "" }}"
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: vaultwarden
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port | default 8000 }}
          env:
            - name: ROCKET_PORT
              value: "{{ .Values.port | default 8000 }}"
            - name: DOMAIN
              value: "https://{{ include "vaultwarden.host" . }}"
            - name: SIGNUPS_ALLOWED
              value: "{{ .Values.signupsAllowed }}"
          volumeMounts:
            - name: data
              mountPath: /data
          resources: {{ toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "vaultwarden.fullname" . }}-data-v{{ .Values.dataVersion | default 1 }}
