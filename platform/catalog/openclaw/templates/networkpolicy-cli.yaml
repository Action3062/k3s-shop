{{- if .Values.webcli.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "openclaw.fullname" . }}-cli-apiserver
spec:
  podSelector:
    matchLabels:
      app: {{ include "openclaw.fullname" . }}-cli
  policyTypes: [Egress]
  egress:
    # kube-apiserver: Node-Endpoints (post-DNAT) ...
    - to:
        - ipBlock:
            cidr: {{ .Values.webcli.apiServerCidr | quote }}
      ports:
        - { port: {{ .Values.webcli.apiServerPort }}, protocol: TCP }
    # ... und die kubernetes Service-ClusterIP (pre-DNAT)
    - to:
        - ipBlock:
            cidr: {{ .Values.webcli.apiServiceCidr | quote }}
      ports:
        - { port: {{ .Values.webcli.apiServicePort }}, protocol: TCP }
{{- end }}
