{{- if .Values.webcli.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}-cli
  labels:
    app: {{ include "openclaw.fullname" . }}-cli
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "openclaw.fullname" . }}-cli
  template:
    metadata:
      labels:
        app: {{ include "openclaw.fullname" . }}-cli
    spec:
      serviceAccountName: {{ include "openclaw.fullname" . }}-cli
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: webcli
          image: "{{ .Values.webcli.image }}:{{ .Values.webcli.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: BASE_PATH
              value: /cli
            - name: TARGET_DEPLOY
              value: {{ include "openclaw.fullname" . | quote }}
            - name: TARGET_CONTAINER
              value: openclaw
          ports:
            - containerPort: 7681
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
{{- end }}
