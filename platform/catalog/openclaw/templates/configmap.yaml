apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw.fullname" . }}-config
data:
  # Gateway-Konfiguration: erreichbar im Pod-Netz (lan) + Control-UI nur vom eigenen
  # HTTPS-Origin erlaubt. Auth (Gateway-Token) bleibt aktiv.
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "controlUi": {
          "allowedOrigins": ["https://{{ include "openclaw.host" . }}"]
        }
      }
    }
  AGENTS.md: |
    # {{ include "openclaw.host" . }}
    Managed OpenClaw-Instanz, bereitgestellt über MeinAppNest.
