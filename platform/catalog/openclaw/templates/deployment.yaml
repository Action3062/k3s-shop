apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    app: openclaw
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate           # RWO-Volume -> kein RollingUpdate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
      annotations:
        meinappnest.io/restart-token: "{{ .Values.restartToken | default "" }}"
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000          # Volume gruppen-schreibbar für uid 1000
      containers:
        - name: openclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # 'raw' umgeht den Image-Entrypoint, damit ttyd mit --base-path unter
          # {{ .Values.webcli.basePath }} laufen kann (das eingebaute gateway-entrypoint.sh
          # kann ttyd kein base-path geben -> würde hinter dem Ingress-Prefix brechen).
          # Persistenz liegt unter HOME=/config (eigenes PVC).
          args:
            - raw
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              install -d -m 0755 "${HOME}/.openclaw" "${HOME}/.openclaw/workspace" "${HOME}/.config/openclaw" "${HOME}/.local/share"
              # eingebaute Web-Shell (ttyd) unter {{ .Values.webcli.basePath }}; Zugriff via Storefront-Gate (forwardAuth)
              ttyd --port {{ .Values.webcli.port }} --interface 0.0.0.0 --base-path {{ .Values.webcli.basePath }} --writable /launch-tmux.sh &
              gw=()
              [ -f "${HOME}/.config/openclaw/config.json" ] || gw+=(--allow-unconfigured)
              exec node /app/dist/index.js gateway \
                --port {{ .Values.port }} --bind {{ .Values.gatewayBind }} ${gw[@]+"${gw[@]}"}
          ports:
            - { name: gateway, containerPort: {{ .Values.port }} }
            - { name: cli, containerPort: {{ .Values.webcli.port }} }
          env:
            # bind=lan explizit setzen (überschreibt den loopback-Default im Image)
            - name: OPENCLAW_GATEWAY_BIND
              value: {{ .Values.gatewayBind | quote }}
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gatewayTokenSecretName }}
                  key: {{ .Values.gatewayTokenSecretKey }}
          volumeMounts:
            - { name: data, mountPath: /config }
            - { name: tmp, mountPath: /tmp }
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.port }} }
            initialDelaySeconds: 25
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            # /healthz (nicht /readyz): bleibt auch im unkonfigurierten Zustand grün,
            # damit der Pod Ready wird und die Web-Shell für `openclaw setup` erreichbar ist.
            httpGet: { path: /healthz, port: {{ .Values.port }} }
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources: {{ toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "openclaw.fullname" . }}-data-v{{ .Values.dataVersion | default 1 }}
        - name: tmp
          emptyDir: {}
