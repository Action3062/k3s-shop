apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: tenant-action3062-openclaw
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "1500m"
        memory: "3072Mi"
