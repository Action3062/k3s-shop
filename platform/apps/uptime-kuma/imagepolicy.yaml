apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: uptime-kuma
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: uptime-kuma
  filterTags:
    pattern: '^v?(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: '$version'
  policy:
    semver:
      range: '>=2.4.0'
