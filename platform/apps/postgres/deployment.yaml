apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: dynstore
  labels: { app: postgres }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70           # postgres user in alpine
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # On the first hardened roll, the on-disk data dir is still owned root:root.
        # postgres (uid 70) cannot write there until ownership is fixed. This init
        # runs as root and chowns the whole tree; subsequent restarts are no-ops.
        - name: chown-data
          image: postgres:16-alpine
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"]
          command:
            - sh
            - -c
            - |
              set -eu
              chown -R 70:70 /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data/pgdata 2>/dev/null || true
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef: { name: dynstore-db }   # POSTGRES_USER/PASSWORD/DB (out-of-band Secret)
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["sh","-c","pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["sh","-c","pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"] }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-data }
