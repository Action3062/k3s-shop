apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: storefront
  labels: { app: storefront }
spec:
  replicas: 1
  selector:
    matchLabels: { app: storefront }
  template:
    metadata:
      labels: { app: storefront }
    spec:
      containers:
        - name: storefront
          image: ghcr.io/action3062/dynstore-storefront:sha-a0b0405
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # Demo-Platzhalter — echte Werte via Secret, sobald DB/Control-Plane angebunden sind.
            - name: DATABASE_URL
              value: "postgresql://u:p@localhost:5432/db?schema=public"
            - name: AUTH_SECRET
              value: "test-only-secret"
            - name: NEXT_PUBLIC_APP_URL
              value: "https://store.meinappnest.org"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
