apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: storefront
  labels: {app: storefront}
spec:
  replicas: 1
  selector:
    matchLabels: {app: storefront}
  template:
    metadata:
      labels: {app: storefront}
    spec:
      containers:
        - name: storefront
          image: ghcr.io/action3062/dynstore-storefront:20260622200736 # {"$imagepolicy": "flux-system:storefront"}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: CONTROL_PLANE_URL
              value: "http://control-plane.dynstore.svc.cluster.local:8080"
            - name: NEXT_PUBLIC_APP_URL
              value: "https://store.meinappnest.org"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: AUTH_TRUST_HOST
              value: "true"
            - name: AUTH_URL
              value: "https://store.meinappnest.org"
          envFrom:
            - secretRef:
                name: storefront-runtime # DATABASE_URL + AUTH_SECRET (out-of-band Secret)
          readinessProbe:
            httpGet: {path: /, port: 3000}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: {cpu: "50m", memory: "256Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
