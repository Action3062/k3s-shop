apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: dynstore
  labels: {app: control-plane}
spec:
  replicas: 1
  selector:
    matchLabels: {app: control-plane}
  template:
    metadata:
      labels: {app: control-plane}
    spec:
      serviceAccountName: control-plane
      containers:
        - name: control-plane
          image: ghcr.io/action3062/dynstore-control-plane:20260620210955 # {"$imagepolicy": "flux-system:control-plane"}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SOPS_AGE_RECIPIENT
              value: "age1v692qut43hq0k07jz6afe75txgtjjpffe0nsyw9qx55p8s5qj50scylpqu"
          envFrom:
            - secretRef: {name: control-plane-runtime}
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
