apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: dynstore
  labels: {app: control-plane}
spec:
  replicas: 1
  selector:
    matchLabels: {app: control-plane}
  template:
    metadata:
      labels: {app: control-plane}
    spec:
      containers:
        - name: control-plane
          image: ghcr.io/action3062/dynstore-control-plane:20260618095258
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef: {name: control-plane-runtime}
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
