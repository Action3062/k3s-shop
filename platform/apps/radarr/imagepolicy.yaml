apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: radarr
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: radarr
  filterTags:
    # 4-teiliges Radarr-Versionsschema X.Y.Z.BUILD; BUILD ist monoton steigend
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+\.(?P<build>[0-9]+)$'
    extract: '$build'
  policy:
    numerical:
      order: asc
