apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: openclaw
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: openclaw
  filterTags:
    # nur stabile Release-Tags v<major>.<minor>.<patch> (schliesst rolling/main aus)
    pattern: '^v(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: '$version'
  policy:
    semver:
      range: '>=2026.6.8'    # immer das hoechste stabile Release; nie aelter als aktuell
