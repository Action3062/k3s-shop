apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: openclaw
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxcdbot
        email: fluxcdbot@users.noreply.github.com
      messageTemplate: 'ci(flux): bump openclaw image {{range .Updated.Images}}{{println .}}{{end}}'
    push:
      branch: main
  update:
    # Tag steht in der Chart-values.yaml (per-Tenant-HelmRelease nutzt diesen Default)
    path: ./platform/catalog/openclaw
    strategy: Setters
