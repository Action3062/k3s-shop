# Produktions-ClusterIssuer — Let's Encrypt DNS-01 via Cloudflare.
# Deckt Wildcards fuer meinappnest.org ab. Das Token-Secret 'cloudflare-api-token'
# wird OUT-OF-BAND angelegt (KEIN Secret im Git):
#   kubectl -n cert-manager create secret generic cloudflare-api-token \
#     --from-literal=api-token=<CLOUDFLARE_API_TOKEN>
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-cloudflare-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
