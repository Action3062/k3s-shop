# Wildcard-Zertifikat für OpenClaw — *.openclaw.meinappnest.org
# Cloudflare DNS-01, via Reflector in tenant-*-openclaw als wildcard-openclaw-tls gespiegelt.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-openclaw
  namespace: cert-manager
spec:
  secretName: wildcard-openclaw-tls
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "tenant-.*-openclaw"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "tenant-.*-openclaw"
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  commonName: "*.openclaw.meinappnest.org"
  dnsNames:
    - "*.openclaw.meinappnest.org"
