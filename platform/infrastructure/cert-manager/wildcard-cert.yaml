# EIN Wildcard-Zertifikat PRO APP — deckt alle <username>.vaultwarden.meinappnest.org ab.
# Zentral in cert-manager via Cloudflare DNS-01 ausgestellt, per Reflector in die
# Tenant-Namespaces (tenant-*-vaultwarden) als Secret 'wildcard-vaultwarden-tls' gespiegelt.
# Fuer jede weitere App eine Kopie mit angepasstem Namen/dnsNames anlegen.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-vaultwarden
  namespace: cert-manager
spec:
  secretName: wildcard-vaultwarden-tls
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "tenant-.*-vaultwarden"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "tenant-.*-vaultwarden"
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  commonName: "*.vaultwarden.meinappnest.org"
  dnsNames:
    - "*.vaultwarden.meinappnest.org"
