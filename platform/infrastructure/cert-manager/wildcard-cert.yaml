# EIN Wildcard-Zertifikat PRO APP — deckt alle <username>.vaultwarden.dyndnsv4.de ab.
# Zentral in cert-manager ausgestellt, via Reflector in die Tenant-Namespaces gespiegelt.
# Für jede weitere App eine Kopie mit angepasstem Namen/dnsNames anlegen.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-vaultwarden
  namespace: cert-manager
spec:
  secretName: wildcard-vaultwarden-tls
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "tenant-.*-vaultwarden"
  issuerRef:
    name: letsencrypt-dyndnsv4
    kind: ClusterIssuer
  commonName: "*.vaultwarden.dyndnsv4.de"
  dnsNames:
    - "*.vaultwarden.dyndnsv4.de"
