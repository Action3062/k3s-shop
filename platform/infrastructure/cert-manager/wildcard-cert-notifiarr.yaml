apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-notifiarr
  namespace: cert-manager
spec:
  secretName: wildcard-notifiarr-tls
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "tenant-.*-notifiarr"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "tenant-.*-notifiarr"
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  commonName: "*.notifiarr.meinappnest.org"
  dnsNames:
    - "*.notifiarr.meinappnest.org"
